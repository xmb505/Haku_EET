<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EET 电梯控制系统 - 登录</title>
    <link rel="stylesheet" href="win95.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #008080;
        }

        .login-window {
            width: 380px;
            position: relative;
        }

        .login-form {
            padding: 8px 16px;
        }

        .login-error {
            background: #ffcccc;
            border: 1px solid #cc0000;
            color: #cc0000;
            padding: 4px 8px;
            font-size: 11px;
            margin-bottom: 8px;
            display: none;
        }

        .login-error.show {
            display: block;
        }

        .login-footer {
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 12px 16px 16px;
        }

        .login-footer button {
            min-width: 80px;
        }

        .version-text {
            font-size: 10px;
            color: var(--win-shadow);
            text-align: center;
            padding: 4px 0 8px;
        }
    </style>
</head>
<body>
    <div class="window login-window">
        <div class="title-bar">
            <span class="title-bar-text">EET 电梯控制系统 v1.0</span>
            <div class="title-bar-controls">
                </div>
        </div>

        <div class="login-form">
            <div class="login-error" id="loginError">请输入正确的用户名和密码</div>

            <div class="form-row">
                <label for="username">用户名：</label>
                <input type="text" id="username" class="form-control" placeholder="请输入用户名" value="admin">
            </div>
            <div class="form-row">
                <label for="password">密　码：</label>
                <input type="password" id="password" class="form-control" placeholder="请输入密码" value="12345678">
            </div>
        </div>

        <div class="login-footer">
            <button onclick="doLogin()" class="btn-primary">确 定</button>
            <button onclick="resetForm()">重 置</button>
        </div>

        <div class="version-text">
            版本 1.0.0 — 模拟模式 | 系统时间: <span id="sysTime">—</span>
        </div>
    </div>

    <script>
        // 系统时间显示
        function updateTime() {
            const now = new Date();
            document.getElementById('sysTime').textContent =
                now.toLocaleString('zh-CN', { hour12: false });
        }
        updateTime();
        setInterval(updateTime, 1000);

        // 登录后跳转
        function doLogin() {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            const errEl = document.getElementById('loginError');

            if (!user || !pass) {
                errEl.textContent = '请输入用户名和密码';
                errEl.classList.add('show');
                return;
            }

            // 存入简易 session
            sessionStorage.setItem('eet_user', user);
            sessionStorage.setItem('eet_login', '1');
            window.location.href = 'dashboard.html';
        }

        function resetForm() {
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            document.getElementById('loginError').classList.remove('show');
        }

        // 回车触发登录
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') doLogin();
        });

        // 如果已登录则直接跳转
        if (sessionStorage.getItem('eet_login') === '1') {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
