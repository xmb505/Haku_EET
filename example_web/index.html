<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EET 电梯控制系统 - 登录</title>
    <link rel="stylesheet" href="win95.css">
    <style>
        @font-face {
            font-family: 'FP12';
            src: url('fusion-pixel-12px-proportional-latin.ttf') format('truetype');
        }
        @font-face {
            font-family: 'FP12';
            src: url('fusion-pixel-12px-proportional-zh_hans.ttf') format('truetype');
            unicode-range: U+4E00-9FFF, U+3400-4DBF, U+FF00-FFEF, U+3000-303F;
        }

        * {
            -webkit-font-smoothing: none;
            -moz-osx-font-smoothing: unset;
            font-smooth: never;
            font-weight: normal !important;
            font-family: 'FP12', monospace;
            image-rendering: pixelated;
        }

        ::-webkit-scrollbar { width: 16px; height: 16px; }
        ::-webkit-scrollbar-track {
            background: repeating-conic-gradient(#c0c0c0 0% 25%, #fff 0% 50%) 0 0 / 2px 2px;
        }
        ::-webkit-scrollbar-thumb {
            background: #c0c0c0;
            border: 2px solid;
            border-color: #fff #404040 #404040 #fff;
        }
        ::-webkit-scrollbar-corner { background: #c0c0c0; }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #008080;
        }

        .login-window {
            width: 380px;
            position: relative;
        }

        .login-form {
            padding: 8px 16px;
        }

        .login-error {
            background: #ffcccc;
            border: 1px solid #cc0000;
            color: #cc0000;
            padding: 4px 8px;
            font-size: 11px;
            margin-bottom: 8px;
            display: none;
        }

        .login-error.show {
            display: block;
        }

        .login-footer {
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 12px 16px 16px;
        }

        .login-footer button {
            min-width: 80px;
            font-weight: normal;
        }

        .title-bar-text {
            font-weight: normal;
        }
    </style>
</head>
<body>
    <div class="window login-window">
        <div class="title-bar">
            <span class="title-bar-text">EET 电梯控制系统 v1.0</span>
            <div class="title-bar-controls">
                </div>
        </div>

        <div class="login-form">
            <div class="login-error" id="loginError">请输入正确的用户名和密码</div>

            <div class="form-row">
                <label for="username">用户名：</label>
                <input type="text" id="username" class="form-control" placeholder="请输入用户名" value="admin">
            </div>
            <div class="form-row">
                <label for="password">密　码：</label>
                <input type="text" id="password" class="form-control" placeholder="请输入密码" autocomplete="off">
            </div>
        </div>

        <div class="login-footer">
            <button onclick="doLogin()" class="btn-primary">登 录</button>
            <button onclick="resetForm()">重 置</button>
        </div>
    </div>

    <script>
        let realPass = '12345678';
        const passEl = document.getElementById('password');
        passEl.value = '*'.repeat(realPass.length);

        passEl.addEventListener('focus', function () {
            this.value = realPass;
            this.select();
        });
        passEl.addEventListener('blur', function () {
            realPass = this.value;
            this.value = '*'.repeat(realPass.length);
        });
        passEl.addEventListener('input', function () {
            realPass = this.value;
        });

        // 登录后跳转
        function doLogin() {
            const user = document.getElementById('username').value.trim();
            const pass = realPass.trim();
            const errEl = document.getElementById('loginError');

            if (!user || !pass) {
                errEl.textContent = '请输入用户名和密码';
                errEl.classList.add('show');
                return;
            }

            // 存入简易 session
            sessionStorage.setItem('eet_user', user);
            sessionStorage.setItem('eet_login', '1');
            window.location.href = 'dashboard.html';
        }

        function resetForm() {
            document.getElementById('username').value = '';
            realPass = '';
            passEl.value = '';
            document.getElementById('loginError').classList.remove('show');
        }

        // 回车触发登录
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') doLogin();
        });

        // 如果已登录则直接跳转
        if (sessionStorage.getItem('eet_login') === '1') {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
