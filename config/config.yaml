# Haku_EET 主配置
# 比赛现场可直接修改 + /reload 热加载，无需重启程序

# IO 配置文件选择（冷切换，改完需重启）
# local_train  : 线下训练（含超载布尔，无 weight_word）
# competition  : 2026 CIMC 比赛（无超载，自动运行 DBX27.0，有 DBW28~38）
# local_with_weight : 线下训练 + 载重 Word（TIA 手动改 DBW28 测试满载逻辑）
io_profile: competition

io2http:
  http_url: http://127.0.0.1:8080/gpio
  ws_url: ws://127.0.0.1:8081/
  # 模拟量 Word 读取（独立端点，与 /gpio 数字量隔离）
  word_read_url: http://127.0.0.1:8080/word_read
  word_read_alias: weight
  # 写合并 tick 间隔（毫秒）：50ms = 20Hz，增大减少 HTTP 请求数，减小降低 IO 延迟
  tick_interval_ms: 20

building:
  min_floor: 1            # 正常使用的最低层（有门）
  max_floor: 10           # 正常使用的最高层（有门）
  top_base_floor: 11      # 上基站楼层（初始化用，只有限位没有门）
  bottom_base_floor: 0   # 下基站楼层（=0层，只有限位没有门）

elevator:
  # 配置跑哪些轿厢（默认全部 6 部）
  # 现场只接了 N 部时改这里：单部调试 [3] / 跑 3 部 [1,2,3] / 全跑 [1,2,3,4,5,6]
  # 改完需重启程序生效（启动时确定，不支持 /reload 动态增删）
  car_ids: [1, 2, 3, 4, 5, 6]
  # 每部电梯初始化配置（方向+目标层）
  # direction: down = 下行碰下 1 限位 → 反向往上到 target_floor
  #            up   = 上行碰上 1 限位 → 反向往下到 target_floor
  # target_floor: 初始化完成后停在几楼（例如 1 = 一楼，10 = 十楼）
  per_car_init:
    '1': { direction: down, target_floor: 1 }
    '2': { direction: down, target_floor: 1 }
    '3': { direction: down, target_floor: 1 }
    '4': { direction: down, target_floor: 1 }
    '5': { direction: down, target_floor: 1 }
    '6': { direction: down, target_floor: 1 }
  # 全局缺省初始化方向（当 per_car_init 中某车未配置时使用）
  # 保留向后兼容
  initialization_direction: down
  # 站点吸附(station_seek)：到站停车后自动监测平层,偏离全速反冲回完美平层
  # 默认关闭——只在需要时启用（/module station_seek on）。开了之后会保持
  # 每部车在完美平层 ✓(↑1↓1),平层丢失立刻反冲。
  station_seek: true
  # 低速阶段叠加刹车档位（0=不叠加，1-7=部分刹车）
  # 切低速接触器时自动叠加，切高速时自动释放
  # /settings slow_brake <N> 可运行时修改并落盘
  slow_brake: 4
  # 门动作完成超时(秒):/door open/close 派发后,等 door_open_done/close_done 信号
  # 超过此时间视为 PLC 异常,cron 兜底自动释放 _door_busy + 打印警告。
  door_complete_timeout: 1
  # 关门延时(秒):开门后等待多久自动关门
  # 当前控制层不读(已剥离 _schedule_close_door 副作用),留给未来 passenger_flow 模块
  door_close_delay: 1
  # 熄灯节能延时(秒):关门后等待多久自动熄灯
  # 当前控制层不读(已剥离 _schedule_lights_off 副作用),留给未来 passenger_flow 模块
  light_off_delay: 600
  # 每部电梯载重配置（用于重量三态机）
  # max_weight: 最大载重（kg）。threshold: 临界百分比（0.95 = 95%）。
  # 临界 = max * threshold ≤ weight ≤ max → state=1（不响应外呼）
  # 超重 = weight > max → state=2（立即开门 + 满载灯 + 应急 polling）
  per_car_weight:
    '1': { max_weight: 900, threshold: 0.95, adc_full_scale_kg: 2000 }
    '2': { max_weight: 900, threshold: 0.95, adc_full_scale_kg: 2000 }
    '3': { max_weight: 900, threshold: 0.95, adc_full_scale_kg: 2000 }
    '4': { max_weight: 900, threshold: 0.95, adc_full_scale_kg: 2000 }
    '5': { max_weight: 900, threshold: 0.95, adc_full_scale_kg: 2000 }
    '6': { max_weight: 900, threshold: 0.95, adc_full_scale_kg: 2000 }
  # 超重应急 polling 间隔（毫秒）:状态 2 期间每 200ms 查一次 word,wait_weight ≤ max 退出
  weight_poll_interval_ms: 1000

algorithm:
  # 首版只实现 simple_internal_call（响应内召，到目标层开门）
  name: simple_internal_call

console:
  # REPL 提示符。比赛现场想换风格时改这里 + /reload，无需重启。
  prompt: 'チルノ＄ '

logging:
  level: DEBUG
  # debug 时改为 DEBUG，看 IO 事件、动作队列、状态机迁移全过程
